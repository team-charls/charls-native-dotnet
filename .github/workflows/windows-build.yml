name: Windows Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SOLUTION: 'CharLSNativeDotNet.sln'
  BUILD_PLATFORM: 'Any CPU'

jobs:
  windows:
    runs-on: windows-2025-vs2026

    strategy:
      matrix:
        include:
        - buildConfiguration: Debug
          artifactsConfiguration: debug
        - buildConfiguration: Release
          artifactsConfiguration: release

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: 'true'
        fetch-depth: '1'

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Setup .NET 9.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x

    - name: Setup .NET 10.0
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore NuGet packages
      run: nuget restore ${{ env.SOLUTION }}

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Build solution
      run: msbuild ${{ env.SOLUTION }} /p:Configuration=${{ matrix.buildConfiguration }} /p:Platform="${{ env.BUILD_PLATFORM }}"

    - name: Test CharLS.Native (.NET Framework 4.8 x86)
      shell: pwsh
      run: |
        $vstest = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
          -latest `
          -products * `
          -requires Microsoft.VisualStudio.PackageGroup.TestTools.Core `
          -find **\Common7\IDE\Extensions\TestPlatform\vstest.console.exe | Select-Object -First 1
        if (-not $vstest) {
          throw "vstest.console.exe not found"
        }

        $configuration = "${{ matrix.artifactsConfiguration }}"
        & $vstest "artifacts/bin/CharLS.Native.Test/${configuration}_net48/CharLS.Native.Test.dll" `
          "/Platform:x86" `
          "/Logger:trx;LogFileName=test-results-net48-x86.trx" `
          "/Settings:tests/CodeCoverage.runsettings" `
          "/EnableCodeCoverage"

    - name: Test CharLS.Native (.NET Framework 4.8 x64)
      shell: pwsh
      run: |
        $vstest = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
          -latest `
          -products * `
          -requires Microsoft.VisualStudio.PackageGroup.TestTools.Core `
          -find **\Common7\IDE\Extensions\TestPlatform\vstest.console.exe | Select-Object -First 1
        if (-not $vstest) {
          throw "vstest.console.exe not found"
        }

        $configuration = "${{ matrix.artifactsConfiguration }}"
        & $vstest "artifacts/bin/CharLS.Native.Test/${configuration}_net48/CharLS.Native.Test.dll" `
          "/Platform:x64" `
          "/Logger:trx;LogFileName=test-results-net48-x64.trx" `
          "/Settings:tests/CodeCoverage.runsettings" `
          "/EnableCodeCoverage"

    - name: Test CharLS.Native (.NET 8.0 x64)
      run: |
        dotnet test tests/CharLS.Native.Test.csproj --framework net8.0 --no-build --configuration ${{ matrix.buildConfiguration }} `
          --logger "trx;LogFileName=test-results-net80-x64.trx" `
          --collect:"XPlat Code Coverage" `
          --settings tests/CodeCoverage.runsettings `
          -- RunConfiguration.TargetPlatform=x64

    - name: Test CharLS.Native (.NET 9.0 x64)
      run: |
        dotnet test tests/CharLS.Native.Test.csproj --framework net9.0 --no-build --configuration ${{ matrix.buildConfiguration }} `
          --logger "trx;LogFileName=test-results-net90-x64.trx" `
          --collect:"XPlat Code Coverage" `
          --settings tests/CodeCoverage.runsettings `
          -- RunConfiguration.TargetPlatform=x64

    - name: Test CharLS.Native (.NET 10.0 x64)
      run: |
        dotnet test tests/CharLS.Native.Test.csproj --framework net10.0 --no-build --configuration ${{ matrix.buildConfiguration }} `
          --logger "trx;LogFileName=test-results-net100-x64.trx" `
          --collect:"XPlat Code Coverage" `
          --settings tests/CodeCoverage.runsettings `
          -- RunConfiguration.TargetPlatform=x64

    - name: Upload test results
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-results-${{ matrix.buildConfiguration }}
        path: '**/TestResults/**'
